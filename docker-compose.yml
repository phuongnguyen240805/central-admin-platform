version: '3.8'

services:
  nest-admin-web:
    image: buqiyuan/vue3-antdv-admin:stable
    container_name: nest-admin-web
    volumes:
      - ./deploy/web:/etc/nginx/conf.d
    ports:
      - 80
    restart: always
    networks:
      - nest_admin_net

  mysql:
    image: mysql:8.0
    container_name: nest-admin-mysql
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_USER=${DB_USERNAME}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - ${DB_PORT:-3306}:3306
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/sql/:/docker-entrypoint-initdb.d/
    networks:
      - nest_admin_net

  redis:
    image: redis:alpine
    container_name: nest-admin-redis
    restart: always
    ports:
      - ${REDIS_PORT:-6379}:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - nest_admin_net

  nest-admin-server:
    build:
      context: .
      args:
        - PROJECT_DIR=/app
    image: buqiyuan/nest-admin-server:stable
    container_name: nest-admin-server
    restart: always
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - ${APP_PORT:-7001}:${APP_PORT:-7001}
    volumes:
      - logs_data:/app/logs/
    depends_on:
      - mysql
      - redis
    networks:
      - nest_admin_net

volumes:
  mysql_data:
  redis_data:
  logs_data:

networks:
  nest_admin_net:
    name: nest_admin_net